
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Fish Pro - By Arnab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #70c5ce;
            font-family: 'Press Start 2P', cursive;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .panel {
            background: #ded895;
            border: 4px solid #543847;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 0 rgba(0,0,0,0.2), inset 0 0 0 4px #e8e4b8;
            pointer-events: auto;
            max-width: 80%;
        }
        h1 {
            color: #fff;
            -webkit-text-stroke: 2px #543847;
            font-size: 24px;
            margin-top: 0;
            line-height: 1.5;
            text-shadow: 3px 3px 0 #543847;
        }
        .author {
            color: #e86101;
            font-size: 12px;
            margin-bottom: 30px;
            text-shadow: 1px 1px 0 #fff;
        }
        .score-text {
            color: #fff;
            -webkit-text-stroke: 1px #543847;
            font-size: 16px;
            margin: 20px 0;
            text-shadow: 2px 2px 0 #543847;
        }
        button {
            background: #f2ce02;
            border: 3px solid #fff;
            outline: 3px solid #543847;
            padding: 15px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: #543847;
            cursor: pointer;
            box-shadow: 0 4px 0 #543847;
            transition: all 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #543847;
        }
        #live-score {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: white;
            -webkit-text-stroke: 3px black;
            text-shadow: 3px 3px 0 black;
            z-index: 5;
            pointer-events: none;
        }
        #watermark {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-size: 12px;
            z-index: 20;
            pointer-events: auto;
            cursor: pointer;
            text-shadow: 2px 2px 0 #543847;
            letter-spacing: 1px;
        }
        .hidden {
            display: none !important;
        }
        /* --- CHEAT MENU STYLES --- */
        #cheat-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center; 
            align-items: center; z-index: 100; pointer-events: auto;
        }
        .cheat-panel {
            background: #ded895; border: 4px solid #543847; border-radius: 10px;
            padding: 20px; text-align: center; width: 85%; max-width: 320px;
        }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .numpad button { padding: 15px 0; font-family: 'Press Start 2P'; font-size: 12px; }
        #pin-display { background: #fff; border: 3px solid #543847; height: 40px; line-height: 40px; margin-bottom: 5px; color: #543847; }
        .err-text { color: #d62828; font-size: 10px; margin-top: 10px; text-shadow: 1px 1px 0 #fff;}
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="live-score" class="hidden">0</div>
    <div id="watermark" onclick="openCheatMenu()">Created by Arnab</div>
    <div id="ui-layer">
        <div id="start-panel" class="panel">
            <h1>FLAPPY<br>FISH</h1>
            <div class="author">Created by Arnab</div>
            <button id="start-btn">PLAY</button>
        </div>
        <div id="game-over-panel" class="panel hidden">
            <h1>GAME OVER</h1>
            <div class="score-text">SCORE: <span id="final-score">0</span></div>
            <div class="score-text">BEST: <span id="best-score">0</span></div>
            <button id="restart-btn">OK</button>
        </div>
    </div>
    <div id="cheat-overlay" class="hidden">
        <div id="pin-panel" class="cheat-panel">
            <p style="font-size: 12px; color: #000;">ENTER PIN</p>
            <div id="pin-display"></div>
            <div class="numpad">
                <button onclick="pressKey('1')">1</button>
                <button onclick="pressKey('2')">2</button>
                <button onclick="pressKey('3')">3</button>
                <button onclick="pressKey('4')">4</button>
                <button onclick="pressKey('5')">5</button>
                <button onclick="pressKey('6')">6</button>
                <button onclick="pressKey('7')">7</button>
                <button onclick="pressKey('8')">8</button>
                <button onclick="pressKey('9')">9</button>
                <button onclick="clearPin()" style="background:#e86101; color:#fff;">C</button>
                <button onclick="pressKey('0')">0</button>
                <button onclick="checkPin()" style="background:#73bf2e; color:#fff;">OK</button>
            </div>
            <div id="pin-err" class="err-text"></div>
            <button onclick="closeCheatMenu()" style="margin-top:10px; width: 100%;">CANCEL</button>
        </div>
        <div id="options-panel" class="cheat-panel hidden">
            <p style="color: #000;">CHEATS UNLOCKED</p>
            <button onclick="toggleGodMode(this)" style="width:100%; margin:5px 0;">GOD MODE: OFF</button>
            <button onclick="addCheatScore()" style="width:100%; margin:5px 0;">+100 SCORE</button>
            <button onclick="closeCheatMenu()" style="margin-top:10px; width: 100%; background:#e86101; color:#fff;">EXIT</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const liveScoreDisplay = document.getElementById('live-score');
        
        let frames = 0;
        let score = 0;
        let bestScore = localStorage.getItem('flappy_best_arnab_pro') || 0;
        let currentState = 'START'; 
        let scaleRatio = 1;
        let scrollSpeed = 0;
        // Cheat Menu Variables
        let currentPin = "";
        let godMode = false;
        let unlocked = false;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'flap') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'score') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            }
        }
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            scaleRatio = Math.min(canvas.width / 400, canvas.height / 600);
            if (scaleRatio > 1.5) scaleRatio = 1.5;
            scrollSpeed = 3.5 * scaleRatio;
        }
        window.addEventListener('resize', resize);
        resize();
        const bg = {
            draw() {
                ctx.fillStyle = '#70c5ce';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                let cloudOffset = (frames * 0.5) % (canvas.width + 200);
                
                function drawCloud(x, y, s) {
                    ctx.beginPath();
                    ctx.arc(x, y, 30*s, 0, Math.PI*2);
                    ctx.arc(x+30*s, y-10*s, 40*s, 0, Math.PI*2);
                    ctx.arc(x+60*s, y, 30*s, 0, Math.PI*2);
                    ctx.fill();
                }
                drawCloud(100 - cloudOffset, 200, 1);
                drawCloud(400 - cloudOffset, 150, 0.8);
                drawCloud(700 - cloudOffset, 250, 1.2);
                drawCloud(100 + canvas.width - cloudOffset, 200, 1);
                drawCloud(400 + canvas.width - cloudOffset, 150, 0.8);
                
                ctx.fillStyle = '#62b5bc';
                let cityOffset = (frames * 1) % canvas.width;
                for(let i=-1; i<4; i++) {
                    let cx = (i * 400) - cityOffset;
                    let cy = canvas.height - ground.h - 100;
                    ctx.fillRect(cx + 50, cy + 20, 60, 80);
                    ctx.fillRect(cx + 120, cy - 10, 50, 110);
                    ctx.fillRect(cx + 180, cy + 40, 70, 60);
                    ctx.fillRect(cx + 260, cy, 40, 100);
                }
            }
        };
        const ground = {
            h: 120,
            draw() {
                this.h = Math.max(120, canvas.height * 0.18);
                let y = canvas.height - this.h;
                
                ctx.fillStyle = '#543847';
                ctx.fillRect(0, y, canvas.width, 4);
                ctx.fillStyle = '#73bf2e';
                ctx.fillRect(0, y + 4, canvas.width, 18);
                ctx.fillStyle = '#ded895';
                ctx.fillRect(0, y + 22, canvas.width, this.h);
                // Seamless angled scrolling ground lines synchronized with game speed
                ctx.fillStyle = '#d1c976';
                let segmentWidth = 40;
                let groundSpeed = (currentState === 'PLAYING' || currentState === 'START') ? scrollSpeed : 0;
                
                // Calculate seamless offset
                let offset = (frames * groundSpeed) % segmentWidth;
                
                for(let i = -segmentWidth * 2; i < canvas.width + segmentWidth * 2; i += segmentWidth) {
                    ctx.beginPath();
                    ctx.moveTo(i - offset, y + 22);
                    ctx.lineTo(i - offset - 25, canvas.height);
                    ctx.lineTo(i - offset - 10, canvas.height);
                    ctx.lineTo(i - offset + 15, y + 22);
                    ctx.fill();
                }
                
                // Top grass details (tufts) scrolling synchronously
                ctx.fillStyle = '#9cde59';
                for(let i = -segmentWidth * 2; i < canvas.width + segmentWidth * 2; i += segmentWidth * 1.5) {
                    ctx.fillRect(i - offset + 10, y + 4, 15, 6);
                    ctx.fillRect(i - offset + 15, y + 4, 5, 10);
                }
            }
        };
        const bird = {
            x: 0,
            y: 0,
            radius: 14,
            velocity: 0,
            gravity: 0.25,
            jump: -6,
            rotation: 0,
            init() {
                this.x = canvas.width * 0.25;
                this.y = canvas.height / 2;
                this.radius = 15 * scaleRatio;
                this.gravity = 0.4 * scaleRatio;
                this.jump = -7 * scaleRatio;
                this.velocity = 0;
                this.rotation = 0;
            },
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                if (currentState === 'PLAYING' || currentState === 'GAMEOVER') {
                    this.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.velocity * 0.1)));
                    if (this.velocity > this.jump * -1) {
                        this.rotation = Math.min(Math.PI / 2, this.rotation + 0.1);
                    }
                } else if (currentState === 'START') {
                    this.rotation = 0;
                }
                ctx.rotate(this.rotation);
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = '#543847';
                
                // Tail Fin
                ctx.fillStyle = '#e86101'; // Orange
                ctx.beginPath();
                ctx.moveTo(-this.radius * 0.8, 0);
                ctx.lineTo(-this.radius * 1.8, -this.radius * 0.8);
                ctx.lineTo(-this.radius * 1.5, 0);
                ctx.lineTo(-this.radius * 1.8, this.radius * 0.8);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                // Top Fin (Dorsal)
                ctx.beginPath();
                ctx.moveTo(-this.radius * 0.2, -this.radius * 0.8);
                ctx.lineTo(-this.radius * 0.6, -this.radius * 1.5);
                ctx.lineTo(this.radius * 0.4, -this.radius * 0.6);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                // Main Body (Yellow like original Flappy, but with fish features)
                ctx.fillStyle = '#f2ce02';
                ctx.beginPath();
                ctx.ellipse(0, 0, this.radius * 1.2, this.radius * 0.9, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                // Fish Lips (Orange)
                ctx.fillStyle = '#e86101';
                ctx.beginPath();
                ctx.ellipse(this.radius * 1.15, -this.radius * 0.15, this.radius * 0.3, this.radius * 0.15, Math.PI/6, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.beginPath();
                ctx.ellipse(this.radius * 1.15, this.radius * 0.15, this.radius * 0.3, this.radius * 0.15, -Math.PI/6, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                // Big White Eye
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.radius * 0.5, -this.radius * 0.35, this.radius * 0.45, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();
                // Pupil
                ctx.fillStyle = '#543847';
                ctx.beginPath();
                ctx.arc(this.radius * 0.65, -this.radius * 0.35, this.radius * 0.15, 0, Math.PI*2);
                ctx.fill();
                // Flapping Pectoral Fin (Replaces Wing)
                ctx.fillStyle = '#e86101';
                let finRotation = 0;
                if (currentState === 'PLAYING' && this.velocity < 0) {
                    finRotation = -Math.PI / 4; 
                } else if (currentState === 'START' && frames % 20 < 10) {
                    finRotation = -Math.PI / 8;
                }
                
                ctx.save();
                ctx.translate(this.radius * 0.1, this.radius * 0.1);
                ctx.rotate(finRotation);
                ctx.beginPath();
                ctx.ellipse(-this.radius * 0.2, this.radius * 0.2, this.radius * 0.5, this.radius * 0.25, -Math.PI/6, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();
                ctx.restore();
                
                ctx.restore();
            },
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;
                if (this.y + this.radius >= canvas.height - ground.h) {
                    this.y = canvas.height - ground.h - this.radius;
                    if (godMode) {
                        this.velocity = this.jump; // Bounce in god mode
                    } else if (currentState === 'PLAYING') {
                        triggerGameOver();
                    }
                }
                if (this.y - this.radius <= 0) {
                    this.y = this.radius;
                    this.velocity = 0;
                }
            },
            flap() {
                this.velocity = this.jump;
                playSound('flap');
            }
        };
        const pipes = {
            items: [],
            gap: 150,
            width: 60,
            init() {
                this.items = [];
                this.gap = 140 * scaleRatio;
                this.width = 65 * scaleRatio;
            },
            draw() {
                for (let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];
                    
                    let bottomY = p.top + this.gap;
                    let bottomH = canvas.height - ground.h - bottomY;
                    ctx.fillStyle = '#543847';
                    ctx.fillRect(p.x - 2, 0, this.width + 4, p.top);
                    ctx.fillRect(p.x - 2, bottomY, this.width + 4, bottomH);
                    ctx.fillStyle = '#73bf2e';
                    ctx.fillRect(p.x, 0, this.width, p.top);
                    ctx.fillRect(p.x, bottomY, this.width, bottomH);
                    ctx.fillStyle = '#9cde59';
                    ctx.fillRect(p.x + 5, 0, 10, p.top - 20);
                    ctx.fillRect(p.x + 5, bottomY + 20, 10, bottomH);
                    ctx.fillStyle = '#543847';
                    ctx.fillRect(p.x - 6, p.top - 24, this.width + 12, 28);
                    ctx.fillRect(p.x - 6, bottomY - 4, this.width + 12, 28);
                    ctx.fillStyle = '#73bf2e';
                    ctx.fillRect(p.x - 4, p.top - 22, this.width + 8, 24);
                    ctx.fillRect(p.x - 4, bottomY - 2, this.width + 8, 24);
                }
            },
            update() {
                if (frames % 90 === 0) {
                    let minTop = 60 * scaleRatio;
                    let maxTop = canvas.height - ground.h - this.gap - (60 * scaleRatio);
                    let topHeight = Math.floor(Math.random() * (maxTop - minTop + 1) + minTop);
                    
                    this.items.push({
                        x: canvas.width,
                        top: topHeight,
                        passed: false
                    });
                }
                for (let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];
                    p.x -= scrollSpeed;
                    let birdLeft = bird.x - bird.radius + 4;
                    let birdRight = bird.x + bird.radius - 4;
                    let birdTop = bird.y - bird.radius + 4;
                    let birdBottom = bird.y + bird.radius - 4;
                    let pipeLeft = p.x;
                    let pipeRight = p.x + this.width;
                    // Ignored if godMode is true
                    if (!godMode && birdRight > pipeLeft && birdLeft < pipeRight) {
                        if (birdTop < p.top || birdBottom > p.top + this.gap) {
                            triggerGameOver();
                        }
                    }
                    if (p.x + this.width < bird.x && !p.passed) {
                        score++;
                        p.passed = true;
                        liveScoreDisplay.innerText = score;
                        playSound('score');
                    }
                    if (p.x + this.width < 0) {
                        this.items.shift();
                        i--;
                    }
                }
            }
        };
        function draw() {
            bg.draw();
            if (currentState === 'PLAYING' || currentState === 'GAMEOVER') {
                pipes.draw();
            }
            ground.draw();
            
            if (currentState === 'START') {
                bird.y = (canvas.height / 2) + Math.sin(frames * 0.1) * 10;
            }
            
            bird.draw();
        }
        function update() {
            if (currentState === 'PLAYING') {
                bird.update();
                pipes.update();
            } else if (currentState === 'GAMEOVER') {
                if (bird.y + bird.radius < canvas.height - ground.h) {
                    bird.velocity += bird.gravity;
                    bird.y += bird.velocity;
                    bird.rotation = Math.min(Math.PI / 2, bird.rotation + 0.1);
                }
            }
        }
        function loop() {
            update();
            draw();
            frames++;
            requestAnimationFrame(loop);
        }
        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('start-panel').classList.add('hidden');
            document.getElementById('game-over-panel').classList.add('hidden');
            liveScoreDisplay.classList.remove('hidden');
            
            bird.init();
            pipes.init();
            score = 0;
            frames = 0;
            liveScoreDisplay.innerText = score;
            currentState = 'PLAYING';
            bird.flap();
        }
        function triggerGameOver() {
            if (currentState === 'GAMEOVER') return;
            currentState = 'GAMEOVER';
            playSound('hit');
            
            canvas.style.transform = "translate(5px, 5px)";
            setTimeout(() => canvas.style.transform = "translate(-5px, -5px)", 50);
            setTimeout(() => canvas.style.transform = "translate(5px, -5px)", 100);
            setTimeout(() => canvas.style.transform = "translate(0, 0)", 150);
            liveScoreDisplay.classList.add('hidden');
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappy_best_arnab_pro', bestScore);
            }
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('best-score').innerText = bestScore;
            
            setTimeout(() => {
                document.getElementById('game-over-panel').classList.remove('hidden');
            }, 500);
        }
        // --- MERGED CHEAT LOGIC ---
        function openCheatMenu() {
            document.getElementById('cheat-overlay').classList.remove('hidden');
            if (unlocked) {
                document.getElementById('pin-panel').classList.add('hidden');
                document.getElementById('options-panel').classList.remove('hidden');
            }
        }
        function closeCheatMenu() {
            document.getElementById('cheat-overlay').classList.add('hidden');
            clearPin();
        }
        function pressKey(n) {
            if (currentPin.length < 4) {
                currentPin += n;
                document.getElementById('pin-display').innerText = "*".repeat(currentPin.length);
            }
            document.getElementById('pin-err').innerText = "";
        }
        function clearPin() {
            currentPin = "";
            document.getElementById('pin-display').innerText = "";
            document.getElementById('pin-err').innerText = "";
        }
        function checkPin() {
            if (currentPin === "7812") {
                unlocked = true;
                document.getElementById('pin-panel').classList.add('hidden');
                document.getElementById('options-panel').classList.remove('hidden');
            } else {
                document.getElementById('pin-err').innerText = "WRONG PASSWORD!";
                currentPin = "";
                document.getElementById('pin-display').innerText = "";
            }
        }
        function toggleGodMode(btn) {
            godMode = !godMode; 
            btn.innerText = 'GOD MODE: ' + (godMode ? 'ON' : 'OFF');
        }
        function addCheatScore() {
            score += 100; 
            liveScoreDisplay.innerText = score;
        }
        function handleInput(e) {
            // Prevent gameplay actions if the user is interacting with the cheat menu
            if (e.target && e.target.closest && e.target.closest('#cheat-overlay')) return;
            if (e.type === 'keydown' && e.code !== 'Space') return;
            if (e.type !== 'touchstart' && e.type !== 'mousedown' && e.type !== 'keydown') return;
            
            if (currentState === 'PLAYING') {
                bird.flap();
            } else if (currentState === 'START') {
                startGame();
            }
        }
        window.addEventListener('keydown', handleInput);
        window.addEventListener('touchstart', handleInput, {passive: false});
        canvas.addEventListener('mousedown', handleInput);
        document.getElementById('start-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            startGame();
        });
        
        document.getElementById('restart-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            startGame();
        });
        bird.init();
        loop();
    </script>
</body>
</html>
